plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.avoloblockers'
version = '0.1.0'

android {
  namespace "expo.modules.avoloblockers"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  buildTypes {
        release {
            consumerProguardFiles 'proguard-rules.pro'
        }
    }
  lintOptions {
    abortOnError false
  }
}
